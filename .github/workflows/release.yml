name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: false

      - name: Test
        run: go test ./...

      - name: Package macOS app
        run: ./scripts/package_release.sh "${GITHUB_REF_NAME:-${{ inputs.version }}}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
          name: Keynari ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/release/Keynari-macOS-*.zip
            dist/release/checksums.txt
